<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>

    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    
    <!-- jQuery Mobile JS -->
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

    <!-- External JS -->
    <script src="script.js"></script>
</head>

<body>

<div data-role="page" id="feedbackPage">

    <div data-role="header">
        <h1>Feedback Form</h1>
    </div>

    <div data-role="content">
        <h2 style="text-align:center; color:#5c6bc0;">We Value Your Feedback !</h2>

        <form id="feedbackForm">

            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email">

            <label for="message">Feedback:</label>
            <textarea id="message" placeholder="Write your feedback"></textarea>

            <!-- Flipped Toggle Switch -->
            <label for="recommend">Recommend Us?</label>
            <select id="recommend" data-role="flipswitch" data-on-text="Yes" data-off-text="No">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>

            <button type="submit" class="ui-btn ui-btn-b">Submit</button>

        </form>

    </div>

</div>

</body>
</html>
